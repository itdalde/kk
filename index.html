<!DOCTYPE html>
<html>
<head>
  <title>CRUD App</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    input, button { padding: 5px; margin: 2px; }
  </style>
</head>
<body>

<h2>SK Camagong KKK Profiling</h2>

<input type="text" id="searchInput" placeholder="Search..." />
<button onclick="searchData()">Search</button>
<button onclick="loadData()">Show All</button>

<table id="dataTable"></table>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzFmf_zh5KaSGNeP0k7XE02dVd8AoZnaBq_PGBp-rGoU6axY7LGUIQh_apxd9578u4w/exec";

// --- LOAD ALL ---
function loadData() {
  const script = document.createElement("script");
  script.src = `${API_URL}?action=list&callback=handleData`;
  document.body.appendChild(script);
}

function handleData(data) {
  const table = document.getElementById("dataTable");
  table.innerHTML = "";
  if (!data || data.error) {
    table.innerHTML = "<tr><td colspan='5'>No data or error</td></tr>";
    return;
  }

  const headers = data[0];
  let html = "<tr>" + headers.map(h => `<th>${h}</th>`).join("") + "</tr>";
  for(let i=1; i<data.length; i++){
    html += "<tr>" + data[i].map(c => `<td>${c}</td>`).join("") + "</tr>";
  }
  table.innerHTML = html;
}

// --- SEARCH ---
function searchData() {
  const name = document.getElementById("searchInput").value;
  const script = document.createElement("script");
  script.src = `${API_URL}?action=search&name=${encodeURIComponent(name)}&callback=handleData`;
  document.body.appendChild(script);
}

// --- INITIAL LOAD ---
loadData();
</script>

</body>
</html>
